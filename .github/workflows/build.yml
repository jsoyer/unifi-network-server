name: Build Docker image

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  TEST_TAG: jsoyer/unifi-network-server:test
  IMAGE: ghcr.io/jsoyer/unifi-network-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export to Docker (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.TEST_TAG }}

      - name: Smoke test
        run: |
          docker run -d --rm --name unifitest ${{ env.TEST_TAG }}
          sleep 35
          for i in $(seq 1 10); do
            status=$(docker inspect --format='{{json .State.Health.Status}}' unifitest)
            [ "$status" = '"healthy"' ] && break || sleep 35
          done
          [ "$(docker inspect --format='{{json .State.Health.Status}}' unifitest)" = '"healthy"' ]
          docker stop unifitest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.TEST_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Build multi-platform (validation only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64/v8,linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.IMAGE }}:pr-${{ github.event.number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.revision=${{ github.sha }}

  notify:
    needs: build
    if: ${{ failure() }}
    uses: ./.github/workflows/notify.yml
    secrets: inherit
    with:
      status: failure
      title: "Build failed on PR #${{ github.event.number }}"
      message: "Docker build or tests failed for PR #${{ github.event.number }}.\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
