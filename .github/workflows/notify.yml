name: Send notifications

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "'success' or 'failure'"
      title:
        required: true
        type: string
      message:
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          STATUS: ${{ inputs.status }}
        run: |
          set -euo pipefail
          [ -z "$WEBHOOK_URL" ] && echo "DISCORD_WEBHOOK_URL not set, skipping" && exit 0
          color=$( [ "$STATUS" = "success" ] && echo 3066993 || echo 15158332 )
          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$MESSAGE" \
            --argjson color "$color" \
            '{embeds: [{title: $title, description: $desc, color: $color}]}')
          curl -sS -f -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

      - name: Slack
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          STATUS: ${{ inputs.status }}
        run: |
          set -euo pipefail
          [ -z "$WEBHOOK_URL" ] && echo "SLACK_WEBHOOK_URL not set, skipping" && exit 0
          color=$( [ "$STATUS" = "success" ] && echo "good" || echo "danger" )
          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg text "$MESSAGE" \
            --arg color "$color" \
            '{attachments: [{title: $title, text: $text, color: $color}]}')
          curl -sS -f -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

      - name: Ntfy
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          STATUS: ${{ inputs.status }}
        run: |
          set -euo pipefail
          [ -z "$NTFY_URL" ] && echo "NTFY_URL not set, skipping" && exit 0
          priority=$( [ "$STATUS" = "success" ] && echo "default" || echo "high" )
          tags=$( [ "$STATUS" = "success" ] && echo "white_check_mark" || echo "x" )
          curl -sS -f \
            -H "Title: $TITLE" \
            -H "Priority: $priority" \
            -H "Tags: $tags" \
            -d "$MESSAGE" \
            "$NTFY_URL"

      - name: Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ] && echo "Telegram secrets not set, skipping" && exit 0
          text=$(printf "<b>%s</b>\n%s" "$TITLE" "$MESSAGE")
          payload=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "$text" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')
          curl -sS -f -H "Content-Type: application/json" \
            -d "$payload" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"

      - name: Email
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          [ -z "$SMTP_SERVER" ] && echo "SMTP_SERVER not set, skipping" && exit 0
          sudo apt-get update -qq && sudo apt-get install -y -qq msmtp >/dev/null
          cat > /tmp/msmtprc <<CONF
          account default
          host $SMTP_SERVER
          port $SMTP_PORT
          auth on
          user $SMTP_USERNAME
          password $SMTP_PASSWORD
          from $SMTP_FROM
          tls on
          tls_starttls on
          CONF
          printf "Subject: %s\nTo: %s\nFrom: %s\n\n%s" \
            "$TITLE" "$NOTIFY_EMAIL" "$SMTP_FROM" "$MESSAGE" \
            | msmtp --file=/tmp/msmtprc "$NOTIFY_EMAIL"
